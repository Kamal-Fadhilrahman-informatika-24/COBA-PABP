name: spinwheel_app
description: SpinWheel App - Flutter Mobile Client for SpinWheel Fun
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.6

  provider: 6.1.2

  shared_preferences: 2.2.3

  intl: 0.19.0

  flutter_local_notifications: 17.2.2

  audioplayers: 4.1.0

  # LOCK SUPABASE VERSIONS
  supabase_flutter: 2.3.4
  supabase: 2.3.0
  postgrest: 2.1.1
  realtime_client: 2.1.0

dependency_overrides:
  postgrest: 2.1.1
  realtime_client: 2.1.0
  supabase: 2.3.0
  supabase_flutter: 2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: 3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/